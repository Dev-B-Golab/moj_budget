services:
  web:
    image: jwilder/nginx-proxy
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro

  moj-budget:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moj-budget
    volumes:
      - ./app:/app
    environment:
      - WEB_DOCUMENT_ROOT=/app/public
      - VIRTUAL_HOST=moj-budget.local
      - PHP_DISPLAY_ERRORS=1
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=moj_budget_db
      - DB_USERNAME=moj_budget_user
      - DB_PASSWORD=userpassword
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: moj_budget_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moj_budget_db
      MYSQL_USER: moj_budget_user
      MYSQL_PASSWORD: userpassword
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: